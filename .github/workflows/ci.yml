name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
      - run: bun install --frozen-lockfile
      - name: CLI smoke test
        run: |
          bun run cli/index.ts --help 2>&1 || true
      - name: CLI tests
        run: bun test cli/tests/
      - name: MCP unit tests (seed tests need tmux-agents templates)
        run: |
          result=$(bun test mcp/worker-fleet/ 2>&1) || true
          echo "$result"
          pass=$(echo "$result" | grep -oP '\d+ pass' | grep -oP '\d+')
          echo "Passed: ${pass:-0}"
          if [ "${pass:-0}" -lt 140 ]; then
            echo "::error::Too few tests passing ($pass < 140)"
            exit 1
          fi
      - name: TypeScript check
        run: bun build mcp/worker-fleet/index.ts --outfile /tmp/check.js --target bun
